<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- background -->
  <rect width="32" height="32" fill="#121213"/>
  <!-- top chain link -->
  <ellipse cx="16" cy="7" rx="5" ry="5" fill="none" stroke="#333335" stroke-width="3"/>
  <!-- bottom chain link -->
  <ellipse cx="16" cy="25" rx="5" ry="5" fill="none" stroke="#333335" stroke-width="3"/>
  <!-- broken link ends -->
  <line x1="13" y1="18" x2="15" y2="14" stroke="#333335" stroke-width="3" stroke-linecap="square"/>
  <line x1="17" y1="18" x2="19" y2="14" stroke="#333335" stroke-width="3" stroke-linecap="square"/>
  <!-- orange burst at break -->
  <circle cx="16" cy="16" r="4" fill="#c2692a" opacity="0.5"/>
  <circle cx="16" cy="16" r="2" fill="#e07a35"/>
</svg>
